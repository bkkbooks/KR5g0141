佩之又書九寸符安於所住北方神燈燭下九年修行神燈自明帝遣黒光童子十二人侍衛已身中央太明太黃太洞太真三元始生之精千二萬重虚生玉真炁典統玉臺千二百生官制御九天之炁攝正三天之真有得之者神仙佩之者成真人行之者光明通靈白日升天右中央黄帝自生神燭通光靈符以黄繒九寸朱書佩之又書九寸符安於所住中央神燈燭下九年修行神燈自明帝遣黃光童子十二人侍衛巳身五帝自生夜燭神燈通光靈符生於虚空之内神光玄照煥落太无天帝君禮而奉焉付金闕聖君上相青童君使受後學當爲真人者若有玄名上參玉格得見此法毎以人定入室燒香禮拜神燈讀誦都畢還東向叩齒二十四通祝曰玄真髙遐清暉夜翳神燭通明玉符同慧真靈内照玄光映界五色童子耀輝徹視得乘飛輿上升帝位畢叩齒二十通咽五方炁各五過止如此五年剋得自明之燭五色童子絡身明徹逺覽逆究无窮明燭每令常明不令中滅也若未能隱䖏逺託山林故在人中安燈別室不得使異炁之人履殗冒穢干忤神真則靈光不現若依此如法明燈光照一城則萬魔滅形千鬼喪目所在真官營衛一門也其法實祕不得妄宣朝得冥傳使寳經輕泄身沒鬼官七玄之祖長充地獄萬劫幽泉巳无仙冀明慎之焉鎮魂固魄飛騰七十四方靈丸雲母四兩雄黃四兩硝石玄參槐仁龍骨五兩猪苓青丘霜虎枚花隂干鷄舌香二兩青木香二兩沉香二兩薫陸香詹糖二兩戎塩三兩空青八兩丹砂八兩石黛白石英二兩太陽嬰童羽衣二兩太陽精上素華二兩桃花四兩真瑰余各四兩北結隂精流花一升二合當以九月建日取之盛别噐中結炁凝精素丹一升二合當以十二月建日取之盛之别噐中神化隂精流珠一升二合當以冬至日取之盛别噐中合二十七種上二十四種法二十四神三種應以三元之精炁二應九晨結魄凝魂五色流黄化形變景无有常方故人服之神鎮氣安當以三月建日合藥五月壬日服丸始合以次從雲毋各别擣三千杵帀桃花合二十四種合七萬二千杵畢各置一柈中未得擣藥仍告齊三十日訖事令童男擣藥童女侍香皆令少口慎言好性善言肉香骨芳之人置藥二十四柈中露着中庭三宿勿令鷄犬外人見不使聞哭聲露畢以次納藥着釜中第一納雲母次椎黃後納桃花内二十四種都畢皆當好以次第相覆令竟釜中次北結隂精流華一升二合次納結炁凝精素華丹一升二合次神化隂精流珠一升二合畢以清稷𣓠一斗二升沃藥上即以土釜盖之令上下内外四面四邉令内外宻厚七分故以雲毋在下其炁充上桃花在上其色冠下故有次第也當先作六一泥土釜二枚用東海左顧牡礪戎塩赤石脂黄丹滑石蚓螻土六分皆等合治擣細篩和以百日米醋和畢擣令相和合成六一之泥也以泥兩土釜内外漸漸薄泥日暴令爆燥稍上内外令厚二寸半都畢仍作竈南向安𨭊孤着竈中央釜底令去地一尺二寸糠火燒之三日三夕令火去釜九寸九日九夕進火令近六寸又九日九夕令火至底令三九二十七日畢寒之三日發開視藥起飛精仰着上釜神藥成也不起更泥如𥘉又進火如先二十七日寒之三日无不成也取三𡻕雄鷄羽掃取之仰着上釜則爲飛丹紫華流精有百變之色玄光映煥七十四方服之一銖身自生流光七十四色左唾則三魂立見右唾則七魄化生七形之童飛羅羽裙神輿玉輦立到於前盛之釜柈精疑釜底則爲玉胎瓊液之膏和以白蜜更合於臼中東向擣之令一萬杵一銖爲一丸丸畢宻噐封之露着中庭三日三夕畢清朝服一丸合三日服王丸即能乘空步虚出有八無今七日含服七丸即自浮景霄霞騰身五嶽五色神官五萬人衛從身形東向服九丸則致青霞緑軿青龍控轡青陽玉童九十人青腰玉女九十人東嶽仙官九千來迎兆身南向服八丸則致絳霞雲軿赤龍控轡絳宫玉童八十人太丹赤圭玉女八十人南嶽仙官八千人來迎兆身西向服六丸則致素霞玉輿六龍控轡耀靈玉童六十人太素玉女六十人西嶽仙官六千人來迎兆身北向服五丸則致皂霞飛輦玄龍控轡太極玉童五十人太玄玉女五十人北嶽仙官五千人來迎兆身又向戊已之上服三丸則致黄霞玉輿十二飛龍控轡中央黄機玉童十二人黄素玉女十二人中嶽仙官千二百人來迎兆身服五事畢即致五嶽仙官奉玉札鳳章請兆之身上詣九宫金闕之下受署真仙之號可謂靈丸之妙大哉凡諸變化作七十四種金銀寳玉赤樹絳實立生水火有妙於琅玕八景四蘂降生神丹之用不能一一具䖏特略大化之㣲凡欲遊戯五嶽周流八極不拘仙官之勞不憚典局之煩未欲升天者自可不須服五方之丸但常服七丸三丸之數固魂鎮魄飛騰七十四方遨遊五嶽夀同三光餘可依五方之數爾若服五方之丸便爲五嶽之司便有局任不得適意世間也流光曜電變景保生上經太極真人時登北漠外羽明野玄隴山紫㣲宫見紫㣲夫人間居寂室固神澄暉仰飡玄流採服二象吐納飛霞逥五光以自映運二曜以䕃軀五色蓊藹流煥瓊臺仰看紫㣲之中壁西北角有刻書玉簡名流光五色童子之章真人清齋三月詣紫㣲奉受其篇紫㣲說是流光曜電變景上經受還修行三年得成真人紫㣲常所寳祕不得妄傳自无金闕玉音紫字青華不得聞見若行之者清齋沐浴燒香寂室静思念真百日得給玉童玉女各五人修行勿懈五色童子憇子之房流光運子之身上登玉清常當清朝日出暉之時入室東向存思東方青光童子名青上玉字飛正身作碧霞之色流光爛照東方一面如電曜之狀乘碧霞之輿玄光流映冠覆一身覺身變入青光之中内外晻冥良乆乃豁除叩齒十二通咽炁九過止祝曰東方童子青上玉君賜我青芝流光之泉玄霞碧輦來迎我身上造玉庭得爲真人次存南方童子名丹暉字玄紀身作赤霞之色流光竟於南方如電暉曜之狀乘絳霞之輿玄光流映冠覆一身覺我身入赤光之中内外晻冥良乆豁除仍叩齒十二通咽炁九過止祝曰南方童子丹暉真君賜我降生之漿流光玉芝之芳丹霞電曜覆䕃我房與我同升俱造帝庭次存西方白光童子名皓華字逥神子身作素霞之色流光爛照西方一面如電曜之狀乘素霞之輦玄光流映冠覆我身覺我變入白光之中内外晻明无所聞見良乆豁除叩齒十二通咽炁九過止祝曰西方童子皓華上君賜我素水玉芝流珠金液之泉素霞飛盖來降我身與我同升俱造太真次存北方黒帝童子名玄明上字太隂文身作皂霞之色流光洞照煥於北方如電曜之狀乘素霞之輦玄光流映冠覆我身變入黒光之中内外晻明无所聞見良乆豁除叩齒十二通咽炁九過止祝曰北方童子玄明上君賜我黒芝玄水玉英皂霞飛軿五色神龍流光晻藹來降我身隨雲上升得造華宫次存中央黄光童子名執中字黄録子身作黄霞之色如黄金之精流光爛照中央五色流曜如電之揚乘黄霞之輦來憇我房纒繞我身覺身變入黄光之中内外晻明无所聞見良乆豁除叩齒十二通咽炁九過止祝曰中央童子執忠神真賜我黄水月華逥精飛晨五色煥落流光内鮮覆我黄華之烟騰空登虚上升帝前都畢思五色混黄更相覆烈雲炁欝勃正帀一室纒繞我身覺體薰薫有熱内外洞徹良乆化見青龍在左肩上白虎在右肩上朱雀在頭上螣蛇在足下冠我身形呪曰五色蓊𣡡白黒赤青中央玄降混合欎冥化爲天獸來衛我形賜我五芝五藏豐盈絳府結絡神華自生夀齊日月長保黃寧千變萬化當升太靈咽液還容保牙求仙上法常以平旦二炁未分之始玄暉巳映形神並降上㑹泥丸精液咸生是故其時咽而服之將來三年面生玉澤光變童顔雲華固根朽齒方生必能長修五老降房神仙升玄夀齊三光不死之道非真勿傳至其時安心定意令五神静寧叩齒十二通以思青腰玉女齎東方少陽之炁青芝玉漿灌漑我身流溢紫㣲宫中祝曰東方青牙飲以朝華玉漿醴泉注液滂沱流潤六府玄注如河身強體輕上攝太霞畢以舌䑛上齒外九過咽之次思南方赤圭玉女齎太陽之炁絳芝玉漿灌漑我身流溢絳宫之中祝曰南方赤牙飲以醴泉玄芝玉漿流溢如川仍潤絳府骨化生神飲食太虛舉體皆仙乘雲駕霄上造帝前便以舌䑛下齒之外八過咽之次存西方太素玉女齎少隂之炁素芝玉漿灌漑身中流溢華盖宫祝曰西方白牙飲以靈液玉水洪流玄芝奕奕灌我六府鎮魂固魄神安胃管名言金格畢以舌䑛上齒之内六過咽之次存北方玉女齎太隂之炁玄芝玉水灌漑我身流溢太倉之宫祝曰北方黒牙服食玄滋飲我飛泉哺我玉𥹋神府充溢如丹如芝夀傾天地億萬同期畢以舌䑛下齒内五過咽之次思中央黄素玉女齎中和之炁黄水水華之丹灌漑我身流溢玉堂祝曰中央黃牙白石峩峩飮食玉𥹋之丹渴飲黄水月華五藏充盈流潤如河夀同三辰萬无傾殂形升九玄御龍飛霞畢以舌䑛上下内外四面反舌㓨玄英取芝液十二過咽之咽液保牙之道中央黃老君太極真人常所修學色如童子膚如玉澤躰充炁盈髮白反黒牙齒根固无有朽落遂致玄降名言玉籍位登清虚與帝同席子若修之當於金闕㝷名玉閣无有仙録不得披釋逥霄降霞御空上法青童君受帝君生於明霞之内五雲纒絡霄炁映容形法帝籍受號玉虚凝真固液方思玄霞以自運念遊霄以登空御玄晨於十天騁飛電以控龍於是精思成真遂乘虛入无其訣省要不雜衆方今以授子便可奉行東方青霞諱飛虚西方白霞諱素廬南方赤霞諱丹映北方黒霞諱玄象中央黄霞諱惣生能知五霞降致飛軿朝夕存思玄霄來請乘空上升身造太清子修此道毎以平旦日始暉之時出中庭叩齒十六通東向三呼五方霞諱畢仰祝曰五方玄霞流映玄虚參七御九逥造我廬得乘飛晨控御紫輿上造太極請受真書畢心拜咽炁三十六止暮向西亦如上法夫人修學上道不知雲霞内名雲輿不爲之降存思亦不致感子得此法行之十八年室生自結之炁雲軿下降運子之身上登玉清也此道寳祕文説玄霞之諱於世人終不得又修其方故宜祕之輕泄罪累子身殃及七祖可不慎之運度天關披神洞觀祕文帝君曰子欲飛騰上造金闕當修洞觀運度天關朝拜父毋存呼内眞遊戯九天上詣帝房每以夜半露出中庭仰存北斗七星朗然思見我身在斗中央隨斗運轉歷度天關至西南方之上便再拜正立叩頭九通仰頭㣲三呼天父地母今故歸身歸身反於父毋自然之尊可不運度我身我身得度永離思路存思二尊仰享福祚畢咽炁二過咽液九過止此二尊天地之至諱玄真之𨼆名不得妄告於人三過告人九天之司減筭損年殞命九泉終不得仙凡修上真之道七星移度披天三關不知此諱九天玉真閉子修思之感非玄門之子不可得而披真靈不爲子降此天地之妙法受者當齎金人玉人各一形詣師口受訣言登盟告度不得違科身沒鬼官殃及七玄受者慎之慎之洞真太上紫度炎光神元變經
