front:
  text: 洞真太上紫度炎光神元變經廣三
  hash: sha256:35103301556f3b04b1ee19fb460d39e92e0a748cf86e323931a9a5bf95d268f0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0141_SJB_000-330553c, image: sjb/33/330553c.png}
body:
  text: 紫度炎光序紫度炎光者非紫度炎光有本文是神經自空虚之中凝炁成章玄光炎映積七千年其文乃見太㣲天帝君以紫蘭結其篇目金簡書其正文仍記爲紫度炎光神玄變經神玄變經者從玄中變而名焉玄章旣存髙上玉皇命金晨玉童西華玉女各三千人侍文左右衛在太上六合紫房之内南極元君主之太㣲帝君記太㣲帝君者生于始青之端曜靈徹玄炁未凝之始結流芳之胄法形焉連光映靈紫雲曜電玄煙流靄丹暉纒絡妙覺潜啓仍採納上契條暢純和吐納冥津遂降生靈之胎哺兼法泉曲芝行年二七金容内發玉華外映洞慧神聦朗覩虚玄編掌帝號其任乎澄流九霄之霞飛眺洞清之源明機覧於極玄須綜運於億津積感加於冥㑹妙啓發於自然是以得御紫度炎光逥神飛霄登空之法修行内應上登玉清髙上之尊道俻以付中央黄老君焉西王母授經時作頌三篇嘯歌九玄䑓崖嶺凝凄凄端心理六覺暢目弃塵滓流霞耀金室虚堂散玄薫積感致靈降形單遁亦分倐忽盻萬劫豈覺周億椿秀圃蔚神階朱瓊煒琳庭流風散空洞玉籟乘虚明紫煙纒曲字丹暉映緑軿飛旗欎玄盖羽節耀紫清登景九霄際遨遊戯鳯城願受榮境子一樂同朝生騰轡控玄暉晏景洞野外流浪尋靈人合形慶霄際手披朱峊户眼若神冲㤗金闕欝嵳峩清景無塵穢解衿玄閬䑓適我良願㑹脫屣三徒難保錬固年邁紫度炎光中方内存招无洞觀天上法帝君結形之始仍學招真之道遐思逺覽潛想内瞩坐觀无崖洞想幽虚年始三𡻕中方審正真神披朗逆知未然究覽極天之境无幽不鑒无上不關无下不盻遂受大帝之號由積感所降豈生便任乎常以平旦天光未明清輝始發之時兩手相摩令熱拭兩目四眥三七過叩齒二十四通以舌盪䑛口内上下周帀令芝液並生咽液九過畢以被通冠覆一身體定卧令中方審正當使内外寂寞不聞音響手掩兩耳閉目内存身見東方九萬里之外山川草木禽獸胡老之𩔖如在目前使分眀審正不定更存乆乆自然見也旣分眀使聞耳中有鐘鼓之聲琅琅良乆仍見東嶽仙官乘碧龍碧霞手把五芝從玉女十二人飛青羽裙齎青精玉胎盛以金柈授與我身旣見仙官覺禮而受之即服覺其味甘便拭目咽氣九過止如此三年目見萬里之事耳聞萬里之音无不朗然逆知方來𠮷㓙年筭長短之兆身生異光洞見表裏招无之道其法極妙口口相傳不形於文次還思如上法内存見南方九萬里之外山川草木土色禽獸越老之人如在目前使分明審正不定更存乆乆自然見也旣分明便聽耳中有百籟之聲嘈嘈良乆仍見南嶽仙官乘飛龍雲盖手把華旙從玉女十二人着青錦飛裙齎玄綱絳實盛以金柈授與我身旣見仙官覺禮而受之即服覺其味酸便拭目九過止如此三年自然洞覩幽虚目見萬里之外耳聞萬里之音乆乆爲之无不朗然逆知方來𠮷㐫之事體生玉澤面有玉光招无之道次存還如上法内存見西方九萬里之外山川土色草木禽獸玄老之人如在眼前使分明審正不定更存乆乆自然見也旣分明便聽正耳中有金鼓之聲鎗鎗良乆仍見西嶽仙官乘素霞飛輿從玉女十二人著玄錦飛裙齎金液丹精盛以金柈旣見仙官覺禮而受之即服覺其味甜便拭目咽氣九過止如此三年目視洞徹察見無窮萬里之事𠮷㐫禍福朗覩未然面有金光招无之道其法至妙不得文傳口口相告次思如上法内存見北方九萬里之外山川土色草木禽獸羌老之人如在眼前使分明審正不定更存乆乆自然見也旣分明便聽耳中有鐘銅之聲琅琅良乆仍見北嶽仙官乘玄雲飛軿手把五芝從玉女十二人着玄錦飛裙齎瓊液琅腴盛以金柈授與我身旣見仙官覺禮而受之即服覺其味苦便拭目咽氣九過止如此三年洞觀八方察幽究虚坐見無窮身輕體明坐在立空招无之道極真難宣次思如上法内存已身徹見九天之上宫䑓山川林木飛禽走獸雲崖无際之端與衆真相接群仙共言審正分明不定更思乆乆自然分明旣聽耳中聞有五音絃磬之聲如可聽聞良乆因見中嶽仙官乘黄霞龍從十二玉女著黄飛裙手把五色華旙齎五芝丹精盛以金柈授與我身旣見仙官仍覺禮而受之即服其味香便拭目咽炁十二過止紫度炎光招旡至極妙法難可口宣行之三年洞覩幽虚徹見玄冥筭禄夀命𠮷㐫之兆一身洞逹面生金光存五方旣畢起坐東向叩齒九通祝曰萬化渾生玄綱御空逥輪无聲運轉四方流光萬里洞覩空洞三精寳曜飛霞欝房晨精玄注九竅開通四㑹八逹存虚招无令我神慧明究𠮷㐫驂駕玄輿緑軿飛轅上升太晨進拜玉皇帝君内存招无洞視觀天上法事畢於此立驗之妙殊於衆用中方審正一心存念入室百日便有彷彿將來三年神冥洞徹无不朗然萬不遺一可謂无中希真真爲之降其道幽㣲非世所論人貴禄位我貴此道四海之主求易此法吾未聞矣吾道不死之根逆知未然洞鑒幽虚仰測无窮聽響萬里之趣旁通天下之竒豈復過乎有得之者刻乘緑軿飛霞玄盖上升帝晨唯在寳祕慎勿妄傳違負明科泄露真文身及祖師七玄父毋同充鬼役身𣳚幽泉負考三官艱苦備受明慎之焉佩受紫度炎光修學存真招无洞視之道常當於别室寂䖏不關人事静念存思天下四方萬里之外山林草木禽獸人民玄夷羌胡傖老異類皆來朝拜巳身又思我兩目有流火之光如星煥落赤曜光充萬里之外四方山澤淮濟林木皆隨光明消除極天清蕩無復塵穢目覩无極之郷周遍洞逹无所不關如此皆令分明審正叩齒九通仰祝曰玄光内映洞鑒无窮徹視逹聽九孔開張流精奔激萬里清通坐覩自然逆究吉㐫得乘飛霞上登太空畢引炁咽液七過止若能修行此道百日之中便有彷彿將來三年目覩空洞坐見萬里之外耳聞萬里之音至極妙道非可文傳口口相付審受祕言流金火鈴流金火鈴以太上大道君遊宴之玄光上激九天之威下滅六天之㓙玄光虚映道君之項流照八極三十萬里三天立正之𥘉罷除六天之始以傳太㣲天帝君神文藏於瓊宫玉房之内虚光自明煥赫上清飛龍毒獸翼其側紫雲玄暉盖其巔玉華之女金真之童各三百人典衛靈文散香虚庭積七千年化生五符光徹八方因有五方營衛之官太㣲天帝君以傳金闕後聖道君後聖道君以付上相青童君使授諸爲真人者佩遊上清學真之夫而無流金火鈴項生圓光皆不得上登三光若有金骨玉質玄名青宫得受此文佩之而行諸天諸地四海五嶽率天衆聖仙官莫不稽首來迎神光駭動所制不輕三元立遣玉童玉女三十六人侍衛其身佩之九年得乘八景玉輿飛行太空流金火鈴者九星之精一名圓光太上之威章生於九天之先結炁成文光明煥赫照徹十方懸精垂映太上之項積十千年化生五鈴神符玄降太㣲天帝君威攝極天之魔神布九霞之庭率天以下莫不總統太上大道君寳祕此道吿下普天主司真仙糺察輕洩有真仙之才得佩此符不依玄科而輕付非真穢慢靈文皆七祖受殃考及先師同充鬼官以紫繒二尺二寸朱書戴之頭上若有金名玉骨得佩此文皆宿命應仙佩符之身出入遊行常當存想巳身項上有圓光映照三十萬里之外九年之中勤心念真清齋篤志剋得真靈下降圓光自明乘空而行坐存立亡五鈴登空步虚保仙上符一名火鈴太㣲天帝君受炁之始玄象𥘉分登九玄虛生之䑓五帝神官衛於八方五符空映若存若亡晻藹鳳䑓之上瓊房曲室之内積七千年其文見焉流光曜於九天寳文欝煥乎玉清左擲則爲流金火鈴右振則冠豁落七元攝制極天之魔威布九霞之庭至極妙道洞㣲難勝帝君方清齋太空瓊䑓洞真之殿玉室金華之房侍女衆真五色神官十億萬人飛獸毒龍俠闕備門巨虬千㝷衛於墻岸鳳鳴龍嘯百音激館威揚廣庭獅子嘷喚衆吹靈歌玉響流璨神妃合唱而奏音玉女鳴絃而拊彈余乃引中央黃帝老君太極四真人設流霞之醴環剛之果赤樹白子𨼆芝雜結衆香芬落積九十日於是龜母按筆太一拂筵天妃侍香玉華結編以白玉爲簡金書其文以付仙都左公封以玉笈雲錦之囊傳付中央黃老君依盟奉受五符稽首而退即致九靈流景雲輿五色神官五萬人飛青翠羽龍帔上登金闕玉清之宫若有金書東華得見此文則宿運應仙佩符而行萬神來朝出虚入宿逥巔五嶽運度五星身生水火變化十方佩之九年降致緑軿上謁三元位登玉清其道祕妙非真不傳輕泄篇目身没形殘依玄真明科七千年得傳一人違盟負誓殃及七玄身及先師同充下鬼十苦八難青帝碧霞流鈴登空歩虛上符東方青帝元洞元明元曜延靈曜元君各九千人青陽玉童九十人侍文左東嶽太山仙官二千四百人青腰玉女九十人侍衛靈文右衛佩符某甲身赤帝丹霞流鈴登空歩虚上符南方赤帝大洞元生大靈機皇君各八千人絳宫玉童八十人侍文左南嶽衡山仙官二千四百人大丹赤圭玉女八十人侍文右衛佩符某甲身白帝青霞流鈴登空歩虚上符西方白帝金城曜元元導太仙君六千人耀靈元化玉童六十人侍文左西嶽華山仙官二千四百人太素玉女六十人侍文右衛佩符某甲身黒帝緑霞流鈴登空歩虚上符北方黒帝玄洞元隂五耀延靈元華欝單君各五千人皇機太極玉童五十人侍文左北嶽恒山仙官二千四百人太玄玉女五十人侍文右衛佩符某甲身黄帝蒼霞流鈴登空歩虚上符中央黄帝中耀五陽五隂中皇洞極髙皇君各千二百人皇機執中玉童十二人侍文左中嶽嵩山仙官各二千四百人黄素玉女十二人侍文右衛佩符某甲身男以丹書青素佩之左女以黄書白素佩之右流金火鈴内存振威大祝神慧修佩流金火鈴出入逺近經履危險㓂病之中厄害之下當存真光以自衛開道萬里之路發行之始正向其方叩左齒二七通咽炁三十六過便思所在之䖏形象山林草木人民禽獸神靈分明朗然皆來朝拜我身思北斗七星覆我頭上仍存我左目爲奔星右目爲迅電其光煥赫奔星九萬里外見所之道路隨光開通山林草木人民屋宅兵㓂鬼炁令消除無復孑遺四道豁然因祝曰前開後閉天平地昻神公出遊四道開張當令天地通我橋梁前後左右洞逹八方左擲奔星右迅電光流火萬里何妖敢當太一將送萬神來迎有所之向靡不𠮷良乘雲駕虚上升太空畢引二目之精各還其宫左取七炁右取七炁咽之畢如此可以冒險渉難攻鬼伐兵无不應響盪然其法至妙不得妄傳五帝流鈴五符威制極天之魔召攝五方神靈上應五晨參落七元下應人身九孔七明周天竟地靡有不關无幽不測細無不鑒存符則先擲符則振威子若佩之口受師言若在人間遇惡鬼之地當作振威大祝北向閉炁十二息思五方炁覆冠一身內外朗明都無所見因叩齒三十六通咽五方炁方啓三咽炁除盡入兆身存我兩目童子光如流星煥落五方便祝曰天元七精五帝流鈴煥擲電光如天奔星光曜十方照鬼真形有何小妖當我生門太上有命誅戮无親屠肝刳腹絶滅鬼精千千皆摧萬萬皆傾神威吐祝攝録无停便咽炁三十六過止如此一祝則五方神官皆保甲命卒録所在有靈之炁束縳詣庭三祝則鬼王滅種若入五嶽周逰山川冒險履峻皆當未及其䖏百歩叩左齒三十六通若之東嶽便存東方青帝希林珠官屬九千人衛我前後左右以青霞之炁覆冠我身若之南嶽便存南方赤帝丹玄子官屬八千人衛我前後以絳霞之炁覆冠我身若之西嶽存西方白帝少皓靈官屬五千人衛我前後以素霞之炁覆冠我身若之北嶽當存北方黒帝玄冥皓官屬五千人衛我前後以皂霞之炁覆冠我身若之中嶽當存